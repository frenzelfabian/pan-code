name: Test
on:
  push:
    paths:
      - 'clef26/generated-plagiarism-detection/baseline-pyterrier/baseline.py'
  
jobs:
  tira-submit:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🚀 Submit to TIRA
      run: |
        # TIRA CLI installieren
        pip install tira-cli
        
        tira-cli code-submission \
          --path . \
          --task pan26-generated-plagiarism-detection \
          --dataset spot-check-dataset-20260227-training \
          --command '/baseline.py --dataset $inputDataset --index /tmp/indexes --output $outputDir' \
          --dry-run
